name: Deploy to Cloud Run

# Manual trigger only, so you don't accidentally deploy on every push.
# Run it from the Actions tab: "Run workflow".
on:
  workflow_dispatch:

env:
  SERVICE_NAME: ai-quiz-studio
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Store this as a repo secret: Settings -> Secrets and variables -> Actions
          # Use a service account key JSON, or switch to Workload Identity Federation.
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for gcr.io
        run: gcloud auth configure-docker --quiet

      - name: Build and push image
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "${{ env.IMAGE }}" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --memory 2Gi \
            --cpu 2 \
            --timeout 900 \
            --allow-unauthenticated
